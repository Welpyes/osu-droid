name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'  # Or 'adopt' if preferred

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact (Optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: osudroid-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk  # Adjust path if your project structure differs
